<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
<title>MSU-SND 50th Commencement Exercises — A4 Booklet Flipbook</title>
<style>
:root{--bg:#17120f;--panel:#241b16;--gold:#e1b24a;--text:#fff7e4;--muted:#cbbda9;--paper:#ffffff}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#3a281e 0,#17120f 58%);color:var(--text);overflow:hidden}
.app{height:100%;display:grid;grid-template-rows:auto 1fr auto}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;background:rgba(20,14,11,.82);backdrop-filter:blur(8px);border-bottom:1px solid rgba(225,178,74,.3);z-index:10}
.title-wrap{display:flex;flex-direction:column;gap:2px;min-width:0}
.title{font-weight:700;letter-spacing:.3px;font-size:clamp(13px,2vw,18px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subtitle{font-size:12px;color:var(--muted)}
.counter{font-size:13px;color:var(--muted);white-space:nowrap}
.stage{position:relative;display:flex;align-items:center;justify-content:center;perspective:2600px;padding:12px;min-height:0;touch-action:none;cursor:default}
.book{position:relative;transform-style:preserve-3d;transform-origin:center center;filter:drop-shadow(0 24px 28px rgba(0,0,0,.55));transition:transform .18s ease;will-change:transform}.book.dragging{transition:none}.stage.zoomed{cursor:grab}.stage.zoomed.dragging{cursor:grabbing}
.spread{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;transform-style:preserve-3d}
.page{position:relative;background:var(--paper);overflow:hidden;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.page.left{border-radius:10px 2px 2px 10px;box-shadow:inset -18px 0 24px rgba(0,0,0,.10), 0 0 0 1px rgba(0,0,0,.06)}
.page.right{border-radius:2px 10px 10px 2px;box-shadow:inset 18px 0 24px rgba(0,0,0,.10), 0 0 0 1px rgba(0,0,0,.06)}
.page.blank{background:linear-gradient(90deg,#f7f5ef,#ffffff)}
.page img{width:100%;height:100%;object-fit:contain;background:#fff;display:block}
.gutter{position:absolute;left:50%;top:0;bottom:0;width:4px;transform:translateX(-2px);background:linear-gradient(#0000,rgba(0,0,0,.22),#0000);z-index:4;pointer-events:none}
.turning{position:absolute;top:0;bottom:0;width:50%;right:0;transform-origin:left center;transform-style:preserve-3d;z-index:8;transition:transform .72s cubic-bezier(.2,.72,.1,1)}
.turning.flip{transform:rotateY(-180deg)}
.turning .front,.turning .back{position:absolute;inset:0;backface-visibility:hidden;background:#fff;overflow:hidden}
.turning .front{border-radius:2px 10px 10px 2px;box-shadow:inset 18px 0 24px rgba(0,0,0,.1), 0 0 0 1px rgba(0,0,0,.06)}
.turning .back{transform:rotateY(180deg);border-radius:10px 2px 2px 10px;box-shadow:inset -18px 0 24px rgba(0,0,0,.1), 0 0 0 1px rgba(0,0,0,.06)}
.turning img{width:100%;height:100%;object-fit:contain;background:#fff}
.controls{display:flex;justify-content:center;gap:10px;padding:10px 12px 14px;background:rgba(20,14,11,.82);border-top:1px solid rgba(225,178,74,.25);flex-wrap:wrap}
button{appearance:none;border:1px solid rgba(225,178,74,.55);background:#2c2019;color:var(--text);padding:10px 18px;border-radius:999px;font-weight:700;cursor:pointer;min-width:120px}
button:hover{background:#493225} button:disabled{opacity:.35;cursor:not-allowed}.zoom-btn{min-width:54px;padding-inline:14px}.zoom-readout{min-width:76px}.sep{width:1px;height:34px;background:rgba(225,178,74,.25);align-self:center;margin:0 2px}
.hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.72);z-index:2;white-space:nowrap;background:rgba(0,0,0,.18);padding:6px 10px;border-radius:999px}
@media(max-width:760px){
  .spread{grid-template-columns:1fr}
  .page.left{display:none}
  .page.right{grid-column:1}
  .gutter{display:none}
  .turning{width:100%;left:0;right:auto;transform-origin:left center}
  .hint{display:none}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="title-wrap">
    <div class="title">MSU-SND 50th Commencement Exercises</div>
    <div class="subtitle">A4 booklet-style flipbook • zoom, pan and pinch supported</div>
  </div>
  <div class="counter" id="counter"></div>
</header>
<main class="stage" id="stage">
  <div class="book" id="book">
    <div class="spread">
      <div class="page left blank" id="leftPage"></div>
      <div class="page right" id="rightPage"></div>
      <div class="gutter"></div>
    </div>
  </div>
  <div class="hint">Zoom: + / −, Ctrl + mouse wheel, pinch, or double-click • drag to pan</div>
</main>
<footer class="controls">
  <button id="prev">← Previous</button>
  <span class="sep" aria-hidden="true"></span>
  <button class="zoom-btn" id="zoomOut" aria-label="Zoom out">−</button>
  <button class="zoom-readout" id="zoomReset" title="Reset zoom">100%</button>
  <button class="zoom-btn" id="zoomIn" aria-label="Zoom in">+</button>
  <span class="sep" aria-hidden="true"></span>
  <button id="next">Next →</button>
</footer>
</div>
<script>
const total=29;
const pages=Array.from({length:total},(_,i)=>`pages/page-${String(i+1).padStart(2,'0')}.jpg`);
let index=0, animating=false;
let zoom=1, panX=0, panY=0, ignoreClickUntil=0;
const MIN_ZOOM=1, MAX_ZOOM=4;
const A4_PAGE_RATIO=210/297;
const A4_SPREAD_RATIO=420/297;
const left=document.getElementById('leftPage'), right=document.getElementById('rightPage'), book=document.getElementById('book');
const prev=document.getElementById('prev'), next=document.getElementById('next'), counter=document.getElementById('counter'), stage=document.getElementById('stage');
const zoomOut=document.getElementById('zoomOut'), zoomIn=document.getElementById('zoomIn'), zoomReset=document.getElementById('zoomReset');
const mobile=()=>matchMedia('(max-width:760px)').matches;
function setPage(el,n){el.innerHTML='';el.classList.toggle('blank',n<0||n>=total);if(n>=0&&n<total){const im=new Image();im.src=pages[n];im.alt=`Page ${n+1}`;el.appendChild(im)}}
function applyView(){
  if(zoom<=1.001){zoom=1;panX=0;panY=0;}
  book.style.transform=`translate3d(${panX}px,${panY}px,0) scale(${zoom})`;
  stage.classList.toggle('zoomed',zoom>1.001);
  zoomReset.textContent=`${Math.round(zoom*100)}%`;
  zoomOut.disabled=zoom<=MIN_ZOOM+.001;
  zoomIn.disabled=zoom>=MAX_ZOOM-.001;
}
function setZoom(value){
  zoom=Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,value));
  applyView();
}
function sizeBook(){
  const r=stage.getBoundingClientRect();
  const maxW=Math.max(100,r.width-24), maxH=Math.max(100,r.height-24);
  const ratio=mobile()?A4_PAGE_RATIO:A4_SPREAD_RATIO;
  let w=maxW, h=w/ratio;
  if(h>maxH){h=maxH; w=h*ratio;}
  book.style.width=`${Math.floor(w)}px`;
  book.style.height=`${Math.floor(h)}px`;
  applyView();
}
function render(){
  sizeBook();
  if(mobile()) { setPage(left,-1); setPage(right,index); counter.textContent=`Page ${index+1} of ${total}`; }
  else { const l=index===0?-1:index-1; setPage(left,l); setPage(right,index); counter.textContent=l<0?`Cover • Page 1 of ${total}`:`Pages ${l+1}–${index+1} of ${total}`; }
  prev.disabled=index===0; next.disabled=index>=total-1;
}
function go(dir){
  if(animating) return;
  const ni=index+dir;
  if(ni<0||ni>=total) return;
  animating=true;
  const turn=document.createElement('div');turn.className='turning';
  const f=document.createElement('div');f.className='front';
  const b=document.createElement('div');b.className='back';
  const fi=new Image(),bi=new Image();fi.src=pages[index];bi.src=pages[ni];f.appendChild(fi);b.appendChild(bi);turn.append(f,b);book.appendChild(turn);
  if(dir<0){turn.style.transformOrigin='right center';turn.style.left='0';turn.style.right='auto';turn.style.transform='rotateY(-180deg)';requestAnimationFrame(()=>requestAnimationFrame(()=>turn.style.transform='rotateY(0deg)'))}
  else requestAnimationFrame(()=>requestAnimationFrame(()=>turn.classList.add('flip')));
  setTimeout(()=>{index=ni;render();turn.remove();animating=false},760)
}
prev.onclick=()=>go(-1);next.onclick=()=>go(1);
right.onclick=()=>{if(Date.now()>ignoreClickUntil && zoom===1)go(1)};
left.onclick=()=>{if(Date.now()>ignoreClickUntil && zoom===1)go(-1)};
zoomOut.onclick=()=>setZoom(zoom-.25);
zoomIn.onclick=()=>setZoom(zoom+.25);
zoomReset.onclick=()=>{zoom=1;panX=0;panY=0;applyView()};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='PageUp')go(-1);
  if(e.key==='+'||e.key==='=')setZoom(zoom+.25);
  if(e.key==='-')setZoom(zoom-.25);
  if(e.key==='0'){zoom=1;panX=0;panY=0;applyView()}
});
stage.addEventListener('wheel',e=>{
  if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(zoom+(e.deltaY<0?.2:-.2));}
},{passive:false});
stage.addEventListener('dblclick',e=>{
  if(e.target.closest('.page')){
    if(zoom>1){zoom=1;panX=0;panY=0;}else zoom=2;
    applyView();
  }
});
const pointers=new Map();
let gestureStart=null,lastTap=0;
function distance(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function midpoint(a,b){return{x:(a.x+b.x)/2,y:(a.y+b.y)/2}}
stage.addEventListener('pointerdown',e=>{
  if(e.target.closest('button'))return;
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  stage.setPointerCapture?.(e.pointerId);
  if(pointers.size===1){gestureStart={x:e.clientX,y:e.clientY,panX,panY,time:Date.now(),moved:false,pinch:false};}
  if(pointers.size===2){
    const [a,b]=[...pointers.values()];
    gestureStart={distance:distance(a,b),zoom,mid:midpoint(a,b),panX,panY,moved:true,pinch:true};
    book.classList.add('dragging');stage.classList.add('dragging');
  } else if(zoom>1){book.classList.add('dragging');stage.classList.add('dragging');}
});
stage.addEventListener('pointermove',e=>{
  if(!pointers.has(e.pointerId))return;
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(!gestureStart)return;
  if(pointers.size>=2){
    const [a,b]=[...pointers.values()];
    const mid=midpoint(a,b);
    zoom=Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,gestureStart.zoom*distance(a,b)/gestureStart.distance));
    panX=gestureStart.panX+(mid.x-gestureStart.mid.x);
    panY=gestureStart.panY+(mid.y-gestureStart.mid.y);
    applyView();ignoreClickUntil=Date.now()+350;
  }else if(zoom>1){
    const p=[...pointers.values()][0];
    if(Math.hypot(p.x-gestureStart.x,p.y-gestureStart.y)>4)gestureStart.moved=true;
    panX=gestureStart.panX+(p.x-gestureStart.x);
    panY=gestureStart.panY+(p.y-gestureStart.y);
    applyView();
  }
});
function endPointer(e){
  const p=pointers.get(e.pointerId);
  if(!p)return;
  const dx=gestureStart?.x!=null?p.x-gestureStart.x:0;
  const dy=gestureStart?.y!=null?p.y-gestureStart.y:0;
  const elapsed=gestureStart?.time?Date.now()-gestureStart.time:9999;
  const wasPinch=gestureStart?.pinch;
  pointers.delete(e.pointerId);
  if(pointers.size===0){
    book.classList.remove('dragging');stage.classList.remove('dragging');
    if(!wasPinch && zoom===1 && elapsed<800 && Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)){ignoreClickUntil=Date.now()+350;go(dx<0?1:-1);}
    else if(!wasPinch && Math.abs(dx)<8 && Math.abs(dy)<8 && e.pointerType==='touch'){
      const now=Date.now();
      if(now-lastTap<320){zoom=zoom>1?1:2;if(zoom===1){panX=0;panY=0;}applyView();ignoreClickUntil=now+350;}
      lastTap=now;
    }
    if(gestureStart?.moved)ignoreClickUntil=Date.now()+300;
    gestureStart=null;
  }
}
stage.addEventListener('pointerup',endPointer);
stage.addEventListener('pointercancel',endPointer);
addEventListener('resize',render);render();
</script>
</body>
</html>
